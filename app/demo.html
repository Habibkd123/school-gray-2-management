<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>School Document Builder</title>
  <style>
    :root {
      --app-bg: #eef1f5;
      --panel-bg: #ffffff;
      --ink: #1f2430;
      --muted: #6b7280;
      --line: #e2e5eb;
      --accent: #2f6f4f;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', Arial, sans-serif;
      background: var(--app-bg);
      color: var(--ink);
    }

    .app {
      display: flex;
      min-height: 100vh;
    }

    /* ---------- LEFT CONTROL PANEL ---------- */
    .panel {
      width: 380px;
      min-width: 340px;
      background: var(--panel-bg);
      border-right: 1px solid var(--line);
      padding: 20px;
      overflow-y: auto;
      height: 100vh;
      position: sticky;
      top: 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
    }

    .brand .logo {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--accent), #1f4d38);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: 700;
      font-size: 16px;
    }

    .brand h1 {
      font-size: 16px;
      margin: 0;
    }

    .brand p {
      margin: 0;
      font-size: 11px;
      color: var(--muted);
    }

    .doc-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 18px;
    }

    .doc-btn {
      border: 1.5px solid var(--line);
      background: #fbfbfd;
      border-radius: 10px;
      padding: 10px 8px;
      font-size: 12px;
      text-align: left;
      cursor: pointer;
      transition: .15s;
      line-height: 1.3;
    }

    .doc-btn b {
      display: block;
      font-size: 12.5px;
      margin-bottom: 2px;
    }

    .doc-btn span {
      color: var(--muted);
      font-size: 10.5px;
    }

    .doc-btn:hover {
      border-color: var(--accent);
    }

    .doc-btn.active {
      border-color: var(--accent);
      background: #eef7f1;
      box-shadow: 0 0 0 1px var(--accent) inset;
    }

    .section-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--muted);
      font-weight: 700;
      margin: 20px 0 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .section-title::after {
      content: "";
      flex: 1;
      height: 1px;
      background: var(--line);
    }

    .theme-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 6px;
    }

    .theme-swatch {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      position: relative;
      flex: 0 0 auto;
    }

    .theme-swatch.active {
      border-color: var(--ink);
    }

    .theme-swatch::after {
      content: "";
      position: absolute;
      inset: 4px;
      border-radius: 50%;
      background: var(--sw2);
    }

    label {
      display: block;
      font-size: 11.5px;
      color: var(--muted);
      margin: 10px 0 4px;
      font-weight: 600;
    }

    input[type=text],
    input[type=date],
    input[type=number],
    textarea,
    select {
      width: 100%;
      padding: 8px 9px;
      border: 1px solid var(--line);
      border-radius: 7px;
      font-size: 13px;
      font-family: inherit;
      background: #fff;
      color: var(--ink);
    }

    textarea {
      resize: vertical;
      min-height: 56px;
    }

    .row2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .row3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }

    .subj-row {
      display: grid;
      grid-template-columns: 1.6fr .8fr .8fr auto;
      gap: 6px;
      margin-bottom: 6px;
      align-items: center;
    }

    .subj-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px;
      margin-bottom: 8px;
      background: #fafbfc;
    }

    .subj-card input[type=text] {
      margin-bottom: 6px;
      font-weight: 600;
    }

    .subj-grid4 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr auto;
      gap: 5px;
      align-items: end;
    }

    .subj-grid4 .cell {
      display: flex;
      flex-direction: column;
    }

    .subj-grid4 .cell span {
      font-size: 9px;
      color: var(--muted);
      margin-bottom: 2px;
      text-transform: uppercase;
      letter-spacing: .03em;
    }

    .subj-grid4 input {
      padding: 5px 6px;
      font-size: 12px;
    }

    .mini-btn {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 6px;
      padding: 6px 8px;
      cursor: pointer;
      font-size: 12px;
    }

    .mini-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .add-row-btn {
      width: 100%;
      margin-top: 4px;
      padding: 8px;
      border: 1.5px dashed var(--line);
      background: #fafbfc;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12.5px;
      color: var(--accent);
      font-weight: 600;
    }

    .add-row-btn:hover {
      background: #eef7f1;
    }

    .photo-drop {
      border: 1.5px dashed var(--line);
      border-radius: 8px;
      padding: 10px;
      text-align: center;
      font-size: 11.5px;
      color: var(--muted);
      cursor: pointer;
    }

    .photo-drop:hover {
      border-color: var(--accent);
    }

    .print-btn {
      width: 100%;
      margin-top: 22px;
      padding: 12px;
      border: none;
      border-radius: 9px;
      background: var(--accent);
      color: #fff;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
    }

    .print-btn:hover {
      filter: brightness(1.08);
    }

    .hint {
      font-size: 10.5px;
      color: var(--muted);
      margin-top: 8px;
      line-height: 1.5;
    }

    /* ---------- RIGHT PREVIEW ---------- */
    .stage {
      flex: 1;
      padding: 36px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      overflow: auto;
      height: 100vh;
    }

    .page {
      width: 210mm;
      min-height: 297mm;
      background: #fff;
      box-shadow: 0 6px 24px rgba(0, 0, 0, .15);
      padding: 14mm;
      position: relative;
    }

    .page.card-size {
      width: 340px;
      min-height: auto;
      height: auto;
      padding: 0;
      box-shadow: 0 8px 20px rgba(0, 0, 0, .2);
      border-radius: 14px;
      overflow: hidden;
    }

    /* --- certificate frame --- */
    .frame {
      border: 3px double var(--pri);
      padding: 16px;
      height: 100%;
      position: relative;
      min-height: calc(297mm - 28mm - 32px);
    }

    .wm {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: .06;
      pointer-events: none;
    }

    .wm svg {
      width: 340px;
      height: 340px;
    }

    .letterhead {
      display: flex;
      align-items: center;
      gap: 16px;
      border-bottom: 2px solid var(--pri);
      padding-bottom: 10px;
      margin-bottom: 14px;
    }

    .emblem {
      width: 64px;
      height: 64px;
      flex: 0 0 auto;
    }

    .lh-text {
      flex: 1;
      text-align: center;
    }

    .lh-text h2 {
      margin: 0;
      color: var(--pri);
      font-size: 23px;
      letter-spacing: .02em;
      font-family: Georgia, 'Times New Roman', serif;
    }

    .lh-text .sub {
      font-size: 11.5px;
      color: #444;
      margin-top: 2px;
    }

    .lh-text .meta {
      font-size: 10px;
      color: #666;
      margin-top: 2px;
    }

    .cert-title {
      text-align: center;
      font-size: 17px;
      font-weight: 800;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--pri);
      margin: 10px 0 4px;
      position: relative;
      display: inline-block;
    }

    .cert-title-wrap {
      text-align: center;
    }

    .cert-title-wrap .rule {
      width: 150px;
      height: 2px;
      background: var(--acc);
      margin: 2px auto 16px;
    }

    .meta-row {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      margin-bottom: 14px;
      color: #333;
    }

    .body-text {
      font-size: 13.5px;
      line-height: 2;
      text-align: justify;
      color: #232323;
    }

    .body-text b {
      color: #000;
    }

    .fill {
      border-bottom: 1px solid #999;
      padding: 0 3px;
      font-weight: 600;
    }

    .sign-row {
      display: flex;
      justify-content: space-between;
      margin-top: 56px;
      font-size: 12px;
    }

    .sign-box {
      text-align: center;
      width: 150px;
    }

    .sign-line {
      border-top: 1px solid #333;
      margin-bottom: 4px;
      padding-top: 4px;
    }

    .seal {
      width: 80px;
      height: 80px;
      border: 2px dashed #999;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      color: #999;
      text-align: center;
      margin: 0 auto 6px;
    }

    table.doc-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12.5px;
      margin: 10px 0;
    }

    table.doc-table th,
    table.doc-table td {
      border: 1px solid #bbb;
      padding: 6px 8px;
    }

    table.doc-table th {
      background: var(--pri);
      color: #fff;
      font-weight: 700;
      text-align: left;
    }

    table.tc-fields td {
      border: 1px solid #ccc;
      padding: 6px 8px;
      vertical-align: top;
    }

    table.tc-fields td.num {
      width: 26px;
      color: #666;
      font-weight: 700;
    }

    table.tc-fields td.label {
      width: 280px;
      font-weight: 600;
      color: #333;
    }

    .badge-strip {
      height: 8px;
      background: linear-gradient(90deg, var(--pri), var(--acc));
      margin: -14mm -14mm 14px -14mm;
    }

    /* ---- MARKSHEET (theory/practical statement style) ---- */
    .ms-titleband {
      background: linear-gradient(90deg, var(--pri), var(--acc));
      color: #fff;
      text-align: center;
      padding: 7px 10px;
      font-weight: 800;
      font-size: 15px;
      letter-spacing: .08em;
      text-transform: uppercase;
      border-radius: 4px;
      margin: 12px 0 14px;
    }

    .ms-info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0 18px;
      font-size: 12px;
      margin-bottom: 12px;
    }

    .ms-info-grid div {
      display: flex;
      justify-content: space-between;
      border-bottom: 1px dotted #ccc;
      padding: 4px 0;
    }

    .ms-info-grid b {
      color: #333;
    }

    table.ms-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
      margin-bottom: 10px;
    }

    table.ms-table th,
    table.ms-table td {
      border: 1px solid #999;
      padding: 6px 7px;
      text-align: center;
    }

    table.ms-table thead tr:first-child th {
      background: var(--pri);
      color: #fff;
    }

    table.ms-table thead tr:last-child th {
      background: #eef0f3;
      color: #333;
      font-size: 10.5px;
    }

    table.ms-table td.subj-name {
      text-align: left;
      font-weight: 600;
    }

    tr.ms-grandtotal td {
      background: var(--acc);
      color: #fff;
      font-weight: 800;
    }

    .ms-footer {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-top: 26px;
    }

    .qr-box {
      width: 70px;
      height: 70px;
      border: 1px solid #999;
      padding: 3px;
    }

    .qr-box svg {
      width: 100%;
      height: 100%;
    }

    .qr-caption {
      font-size: 8.5px;
      color: #777;
      text-align: center;
      margin-top: 3px;
      width: 70px;
    }

    .ms-result-strip {
      display: flex;
      justify-content: space-around;
      background: #f5f5f5;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 8px;
      margin-bottom: 6px;
      font-size: 12.5px;
    }

    .ms-result-strip b {
      display: block;
      color: var(--pri);
      font-size: 15px;
    }

    /* ---- ID CARD ---- */
    .idcard {
      width: 340px;
      background: #fff;
    }

    .idc-head {
      background: linear-gradient(135deg, var(--pri), var(--acc));
      color: #fff;
      padding: 12px 14px 30px;
      text-align: center;
      position: relative;
    }

    .idc-head h3 {
      margin: 0;
      font-size: 14.5px;
      font-family: Georgia, serif;
    }

    .idc-head p {
      margin: 2px 0 0;
      font-size: 9.5px;
      opacity: .9;
    }

    .idc-photo {
      width: 78px;
      height: 90px;
      background: #f1f1f1;
      border: 3px solid #fff;
      border-radius: 6px;
      position: absolute;
      left: 50%;
      top: 52px;
      transform: translateX(-50%);
      box-shadow: 0 2px 6px rgba(0, 0, 0, .25);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      color: #999;
    }

    .idc-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .idc-body {
      padding: 46px 16px 12px;
      text-align: center;
    }

    .idc-name {
      font-size: 15px;
      font-weight: 800;
      color: var(--pri);
      margin-bottom: 1px;
    }

    .idc-role {
      font-size: 11px;
      color: var(--acc);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: 10px;
    }

    .idc-grid {
      text-align: left;
      font-size: 11px;
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 4px 8px;
      margin-top: 8px;
    }

    .idc-grid b {
      color: #444;
      font-weight: 600;
    }

    .idc-foot {
      background: #f5f5f5;
      padding: 8px 14px;
      font-size: 9px;
      color: #666;
      text-align: center;
      border-top: 1px solid #e2e2e2;
    }

    .idc-strip {
      height: 6px;
      background: repeating-linear-gradient(90deg, var(--pri) 0 6px, #fff 6px 8px);
    }

    /* ---- SALARY SLIP ---- */
    .pay-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      border: 1px solid #bbb;
      margin-top: 10px;
    }

    .pay-col {
      padding: 0;
    }

    .pay-col h4 {
      margin: 0;
      background: var(--pri);
      color: #fff;
      padding: 7px 10px;
      font-size: 12px;
    }

    .pay-line {
      display: flex;
      justify-content: space-between;
      padding: 6px 10px;
      font-size: 12.5px;
      border-bottom: 1px solid #eee;
    }

    .pay-total {
      display: flex;
      justify-content: space-between;
      padding: 8px 10px;
      font-size: 13px;
      font-weight: 800;
      background: #f7f7f7;
      border-top: 2px solid #ccc;
    }

    .netpay {
      margin-top: 12px;
      text-align: center;
      background: #f4f9f6;
      border: 1.5px solid var(--pri);
      border-radius: 8px;
      padding: 12px;
    }

    .netpay .amt {
      font-size: 22px;
      font-weight: 800;
      color: var(--pri);
    }

    @media print {
      body * {
        visibility: hidden;
      }

      .page,
      .page * {
        visibility: visible;
      }

      .page {
        position: absolute;
        left: 0;
        top: 0;
        box-shadow: none;
        margin: 0;
      }

      @page {
        size: A4;
        margin: 0;
      }

      .page.card-size {
        width: 85.6mm;
      }
    }
  </style>
</head>

<body>
  <div class="app">

    <!-- ============ LEFT CONTROL PANEL ============ -->
    <div class="panel">
      <div class="brand">
        <div class="logo">SD</div>
        <div>
          <h1>School Document Builder</h1>

      <div class="section-title">Choose Document</div>

      <div class="section-title">Theme Color</div>
      <div class="theme-row" id="themeRow"></div>

      <div class="section-title">School Details (applies to all documents)</div>
      <div id="schoolFields"></div>

      <div class="section-title" id="docFieldsTitle">Document Details</div>
      <div id="docFields"></div>

      <button class="print-btn" onclick="window.print()">🖨️ Print / Save as PDF</button>
      <p class="hint">Tip: In the print dialog choose "Save as PDF" as the destination to download the document instead
        of printing it.</p>
    </div>

    <!-- ============ RIGHT PREVIEW ============ -->
    <div class="stage">
      <div class="page" id="pageEl">
        <div id="previewRoot"></div>
      </div>
    </div>
  </div>

    /* ---------- field definitions per document type ---------- */
    const FIELD_DEFS = {

      return dt.toLocaleDateString('en-GB', { day: '2-digit', month: 'long', year: 'numeric' });

    function inputField(container, keyPrefix, key, label, type, value, onChange) {
      const wrap = document.createElement('div');
      if (type === 'select') {
        // value here is "opt1|opt2" originally, but we pass current value + options separately handled outside
      }
      wrap.innerHTML = `<label>${label}</label>`;
      let inputEl;
      if (type === 'textarea') {
        inputEl = document.createElement('textarea');
        inputEl.value = value;
      } else if (type === 'select') {
        inputEl = document.createElement('select');
      } else {
        inputEl = document.createElement('input');
        inputEl.type = type;
        inputEl.value = value;
      }
      wrap.appendChild(inputEl);
      container.appendChild(wrap);
      inputEl.addEventListener('input', () => onChange(inputEl.value));
      return inputEl;
    }

    function renderSchoolFields() {
      const el = document.getElementById('schoolFields');
      el.innerHTML = '';

        ['schoolName', 'School Name', 'text'],

    function renderDocFields() {
      document.getElementById('docFieldsTitle').textContent = DOC_TITLES[state.docType] + ' Details';
      const el = document.getElementById('docFields');
      el.innerHTML = '';

      if (state.docType === 'marksheet') {
        renderMarksheetPanel(el);
        return;
      }

      const defs = FIELD_DEFS[state.docType];
      const data = state.data[state.docType];

      defs.forEach(([key, label, type, def]) => {
        if (type === 'select') {
          const wrap = document.createElement('div');
          wrap.innerHTML = `<label>${label}</label>`;
          const sel = document.createElement('select');
          def.split('|').forEach(opt => {
            const o = document.createElement('option');
            o.value = opt; o.textContent = opt;
            if (data[key] === opt) o.selected = true;
            sel.appendChild(o);
          });
          sel.addEventListener('change', () => { data[key] = sel.value; renderPreview(); });
          wrap.appendChild(sel);
          el.appendChild(wrap);
        } else {
          inputField(el, state.docType, key, label, type, data[key], (v) => {
            data[key] = v; renderPreview();
          });
        }
      });

      // extra: photo upload for ID card
      if (state.docType === 'idcard') {
        const wrap = document.createElement('div');
        wrap.innerHTML = `<label>Photo</label>`;
        const drop = document.createElement('div');
        drop.className = 'photo-drop';
        drop.textContent = state.photo ? 'Photo selected — click to change' : 'Click to upload photo (optional)';
        const fileInput = document.createElement('input');
        fileInput.type = 'file'; fileInput.accept = 'image/*'; fileInput.style.display = 'none';
        fileInput.addEventListener('change', e => {
          const f = e.target.files[0];
          if (!f) return;
          const reader = new FileReader();
          reader.onload = () => { state.photo = reader.result; renderPreview(); drop.textContent = 'Photo selected — click to change'; };
          reader.readAsDataURL(f);
        });
        drop.addEventListener('click', () => fileInput.click());
        wrap.appendChild(drop); wrap.appendChild(fileInput);
        el.appendChild(wrap);
      }
    }

    /* ===================== MARKSHEET: multi-format panel ===================== */

    function renderMarksheetPanel(el) {
      // format selector
      const fmtWrap = document.createElement('div');
      fmtWrap.innerHTML = `<label>Marksheet Format</label>`;
      const fmtSel = document.createElement('select');
      MS_FORMATS.forEach(f => {

        if (f.id === state.msFormat) o.selected = true;
        fmtSel.appendChild(o);
      });
      fmtSel.addEventListener('change', () => {
        state.msFormat = fmtSel.value;
        renderDocFields();
        renderPreview();
      });
      fmtWrap.appendChild(fmtSel);
      el.appendChild(fmtWrap);

      // fields for the chosen format
      const data = state.data.marksheet;
      const defs = getFieldDefsForFormat(state.msFormat);
      defs.forEach(([key, label, type, def]) => {
        if (type === 'select') {
          const wrap = document.createElement('div');
          wrap.innerHTML = `<label>${label}</label>`;
          const sel = document.createElement('select');
          def.split('|').forEach(opt => {
            const o = document.createElement('option');
            o.value = opt; o.textContent = opt;
            if (data[key] === opt) o.selected = true;
            sel.appendChild(o);
          });
          sel.addEventListener('change', () => { data[key] = sel.value; renderPreview(); });
          wrap.appendChild(sel);
          el.appendChild(wrap);
        } else {
          inputField(el, 'marksheet', key, label, type, data[key], (v) => {
            data[key] = v; renderPreview();
          });
        }
      });

      // subject editor (shape depends on format)
      const subjWrap = document.createElement('div');
      subjWrap.innerHTML = `<label>Subjects &amp; Marks</label>`;
      const listDiv = document.createElement('div');
      subjWrap.appendChild(listDiv);
      el.appendChild(subjWrap);

      if (state.msFormat === 'iti') {
        renderTheoryPracticalEditor(listDiv, state.subjects.iti, subjWrap);
      } else if (state.msFormat === 'cceGrade') {
        renderGradeTermEditor(listDiv, state.subjects.cceGrade, subjWrap);
      } else {
        renderSimpleSubjectEditor(listDiv, state.subjects[state.msFormat], subjWrap);
      }

      // co-scholastic editor, if this format has one
      const co = state.coScholastic[state.msFormat];
      if (co) {
        const coTitle = document.createElement('div');
        coTitle.innerHTML = `<label>Co-Scholastic Activities</label>`;
        el.appendChild(coTitle);
        co.forEach(item => {
          const row = document.createElement('div');
          row.className = 'subj-card';
          if ('max' in item) {
            row.innerHTML = `<div style="font-size:12px;font-weight:600;margin-bottom:6px;">${item.name}</div>
          <div class="subj-grid4" style="grid-template-columns:1fr 1fr 1fr;">
            <div class="cell"><span>Max</span><input type="number" value="${item.max}" data-k="max"></div>
            <div class="cell"><span>Obt.</span><input type="number" value="${item.obt}" data-k="obt"></div>
            <div class="cell"><span>Grade</span><input type="text" value="${item.grade}" data-k="grade"></div>
          </div>`;
          } else {
            row.innerHTML = `<div style="font-size:12px;font-weight:600;margin-bottom:6px;">${item.name}</div>
          <div class="subj-grid4" style="grid-template-columns:1fr;">
            <div class="cell"><span>Grade</span><input type="text" value="${item.grade}" data-k="grade"></div>
          </div>`;
          }
          row.querySelectorAll('input').forEach(inp => {
            inp.addEventListener('input', () => {
              const k = inp.dataset.k;
              item[k] = (k === 'grade') ? inp.value : (Number(inp.value) || 0);
              renderPreview();
            });

          el.appendChild(row);
        });
      }

    function qrSVG(seedStr) {
      // deterministic pseudo-QR decorative pattern (not a scannable code, purely visual)
      let seed = 0;
      for (let i = 0; i < seedStr.length; i++) seed = (seed * 31 + seedStr.charCodeAt(i)) >>> 0;
      function rnd() { seed = (seed * 1103515245 + 12345) >>> 0; return (seed >>> 8) % 100 / 100; }
      const n = 9, cell = 100 / n;
      let rects = '';
      for (let r = 0; r < n; r++) {
        for (let c = 0; c < n; c++) {
          const isFinder = (r < 3 && c < 3) || (r < 3 && c > n - 4) || (r > n - 4 && c < 3);
          const on = isFinder ? (r === 0 || r === 2 || c === 0 || c === 2 || (r === 1 && c === 1)) : rnd() > 0.55;
          if (on) rects += `<rect x="${c * cell}" y="${r * cell}" width="${cell}" height="${cell}" fill="#222"/>`;
        }
      }
      return `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><rect width="100" height="100" fill="#fff"/>${rects}</svg>`;
    }

    function gradeFor(pct) {
      if (pct >= 90) return 'A1'; if (pct >= 80) return 'A2'; if (pct >= 70) return 'B1';
      if (pct >= 60) return 'B2'; if (pct >= 50) return 'C1'; if (pct >= 40) return 'C2';
      if (pct >= 33) return 'D'; return 'E';
    }

      <div class="idc-body">
        <div class="idc-name">${d.name}</div>
        <div class="idc-role">${d.role}</div>
        <div class="idc-grid">
          <b>Class/Desig.</b><span>${d.classOrDesig}</span>
          <b>Roll/ID No.</b><span>${d.idNo}</span>
          <b>Blood Group</b><span>${d.bloodGroup}</span>
          <b>DOB</b><span>${fmtDate(d.dob)}</span>
          <b>Contact</b><span>${d.contact}</span>
          <b>Address</b><span>${d.address}</span>
        </div>
      </div>
      <div class="idc-strip"></div>
      <div class="idc-foot">Valid till ${d.validTill} &nbsp;•&nbsp; If found, please return to school office</div>
    </div>`;
    }

    const TEMPLATE_FNS = {
      bonafide: tplBonafide, tc: tplTC, character: tplCharacter, study: tplStudy,
      experience: tplExperience, salary: tplSalary, idcard: tplIdCard, marksheet: tplMarksheet,
    };

    function renderPreview() {
      const t = THEMES[state.theme];
      const pageEl = document.getElementById('pageEl');
      pageEl.style.setProperty('--pri', t.pri);
      pageEl.style.setProperty('--acc', t.acc);
      pageEl.classList.toggle('card-size', state.docType === 'idcard');
      document.getElementById('previewRoot').innerHTML = TEMPLATE_FNS[state.docType]();
    }

    function renderAll() {
      renderDocGrid();
      renderThemeRow();
      renderSchoolFields();
      renderDocFields();
      renderPreview();
    }

    renderAll();
  </script>
</body>

</html>
